function startDemo() {
    document.getElementById('startScreen').classList.add('hidden');
    setTimeout(() => playScene(0), 500);
}

function addMessage(html, delay = 0) {
    return new Promise(resolve => {
        setTimeout(() => {
            const container = document.getElementById('chatContainer');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = html;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            resolve(div);
        }, delay);
    });
}

function userBubble(text) {
    return '<div class=\"user-msg\"><div class=\"user-bubble\">' + text + '</div><div class=\"user-avatar\">黄</div></div>';
}

function aiLabel() {
    return '<div class=\"ai-label\"><div class=\"ai-avatar\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"white\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12\"/></svg></div><span>锐捷智才Radar</span><span class=\"tag\">业务顾问</span></div>';
}

async function playScene(index) {
    const scene = scenes[index];
    await addMessage(userBubble(scene.user), 300);
    
    let stepsHtml = '';
    for(let i=0; i<scene.thinking.length; i++) {
        const s = scene.thinking[i];
        stepsHtml += '<div class=\"thinking-step ' + (s.done ? 'done' : 'active') + '\" id=\"step-' + index + '-' + i + '\"><div class=\"check\">' + (s.done ? '✓' : '') + '</div><div>' + s.text + '</div></div>';
    }
    
    const thinkingHtml = '<div class=\"ai-msg\">' + aiLabel() + '<div class=\"thinking-box\"><div class=\"thinking-title\"><div class=\"spinner\"></div>AI 深度检索与分析中...</div>' + stepsHtml + '</div></div>';
    await addMessage(thinkingHtml, 600);
    
    await new Promise(r => setTimeout(r, 1500));
    const lastStep = document.getElementById('step-' + index + '-' + (scene.thinking.length-1));
    if(lastStep) {
        lastStep.classList.remove('active');
        lastStep.classList.add('done');
        lastStep.querySelector('.check').textContent = '✓';
    }
    await new Promise(r => setTimeout(r, 800));
    
    let resultHtml = '';
    if(scene.result.type === 'successor') {
        let cardsHtml = '';
        for(let c of scene.result.candidates) {
            cardsHtml += '<div class=\"candidate-card ' + (c.color === 'orange' ? 'orange' : '') + '\"><div class=\"candidate-avatar\">' + c.initial + '</div><div class=\"candidate-name\">' + c.name + '</div><div class=\"candidate-role\">' + c.role + '</div><div class=\"candidate-score\">' + c.score + '分</div><div class=\"candidate-label\">岗位匹配度</div></div>';
        }
        resultHtml = '<div class=\"ai-msg\">' + aiLabel() + '<div class=\"card-result\"><div class=\"card-title\">' + scene.result.title + '</div><div style=\"font-size:12px;color:#5a6c7d;margin-bottom:10px;\">' + scene.result.desc + '</div><div class=\"candidate-row\">' + cardsHtml + '</div><div style=\"font-size:12px;color:#5a6c7d;margin-bottom:6px;\">核心能力雷达图</div><div class=\"chart-box\" id=\"radar-' + index + '\"></div><div class=\"insight-box\">💡 <strong>AI 终选建议：</strong>' + scene.result.insight + '</div></div></div>';
    } else if(scene.result.type === 'cross') {
        let crossHtml = '';
        for(let c of scene.result.candidates) {
            let tagsHtml = '';
            for(let t of c.tags) { tagsHtml += '<span class=\"cross-tag\">' + t + '</span>'; }
            crossHtml += '<div class=\"cross-candidate\"><div class=\"cross-avatar\" style=\"background:' + c.bg + '\">' + c.initial + '</div><div class=\"cross-info\"><div class=\"cross-name\">' + c.name + '</div><div class=\"cross-role\">' + c.role + '</div><div class=\"cross-tags\">' + tagsHtml + '</div></div><div class=\"cross-score\">' + c.score + '分</div></div>';
        }
        resultHtml = '<div class=\"ai-msg\">' + aiLabel() + '<div class=\"card-result\"><div class=\"card-title\">' + scene.result.title + '</div><div style=\"font-size:12px;color:#5a6c7d;margin-bottom:10px;\">' + scene.result.desc + '</div>' + crossHtml + '<div class=\"insight-box\" style=\"margin-top:10px;\">⚡ ' + scene.result.insight + '</div></div></div>';
    } else if(scene.result.type === 'team') {
        resultHtml = '<div class=\"ai-msg\">' + aiLabel() + '<div class=\"card-result\"><div class=\"card-title\">' + scene.result.title + '</div><div style=\"font-size:12px;color:#5a6c7d;margin-bottom:6px;\">' + scene.result.subtitle + '</div><div class=\"chart-box\" id=\"team-radar-' + index + '\"></div><div class=\"insight-box\">🏢 ' + scene.result.insight + '</div></div></div>';
    }
    
    await addMessage(resultHtml, 400);
    
    setTimeout(() => {
        if(scene.result.type === 'successor' && scene.result.radarData) {
            initRadar('radar-' + index, scene.result.radarData, ['#0066FF', '#ff6b35']);
        }
        if(scene.result.type === 'team' && scene.result.radarData) {
            initRadar('team-radar-' + index, scene.result.radarData, ['#0066FF', '#ff6b35']);
        }
    }, 100);
    
    currentScene = index + 1;
}

function initRadar(domId, data, colors) {
    const chart = echarts.init(document.getElementById(domId));
    const option = {
        radar: {
            indicator: data.indicator,
            radius: '62%',
            axisName: { color: '#8b9db3', fontSize: 10 },
            splitArea: { areaStyle: { color: ['#f8fafc', '#fff'] } },
            axisLine: { lineStyle: { color: '#e2e8f0' } },
            splitLine: { lineStyle: { color: '#e2e8f0' } }
        },
        series: [{
            type: 'radar',
            data: data.series.map((s, i) => ({
                value: s.value,
                name: s.name,
                lineStyle: { color: colors[i], width: 2 },
                areaStyle: { color: colors[i], opacity: 0.12 },
                itemStyle: { color: colors[i] },
                symbol: 'circle',
                symbolSize: 5
            }))
        }],
        legend: {
            bottom: 0,
            textStyle: { fontSize: 11, color: '#5a6c7d' },
            itemWidth: 10,
            itemHeight: 10
        }
    };
    chart.setOption(option);
}

function handleEnter(e) {
    if(e.key === 'Enter') sendMessage();
}

function sendMessage() {
    const input = document.getElementById('inputBox');
    const text = input.value.trim();
    if(!text) return;
    
    if(currentScene < scenes.length) {
        input.value = '';
        playScene(currentScene);
    } else {
        addMessage(userBubble(text), 0);
        setTimeout(() => {
            addMessage('<div class=\"ai-msg\">' + aiLabel() + '<div class=\"ai-bubble\">已收到您的需求，黄总。锐捷智才Radar随时为您提供人才搜寻与组织诊断服务。<br><br><span style=\"color:#8b9db3;font-size:11px;\">支持：继任者规划 | 跨界人才扫描 | 团队能力诊断 | 组织健康度分析</span></div></div>', 400);
        }, 600);
        input.value = '';
    }
}
</script>
